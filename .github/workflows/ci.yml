name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --no-audit --no-fund
      - run: node --test tests/*.test.js
      - name: Verify dist/ is up to date
        run: |
          npx ncc build src/index.js -o dist --minify
          if ! git diff --quiet dist/; then
            echo "::error::dist/ is out of sync with src/. Run 'npx ncc build src/index.js -o dist --minify' and commit."
            git diff dist/ | head -30
            exit 1
          fi

  selftest:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run the action against itself (mock vault)
        uses: ./
        continue-on-error: true
        with:
          vault-repo: chirag127/envpact-secrets
          vault-token: ${{ secrets.GITHUB_TOKEN }}
          project-name: envpact-action
          output-file: .env.test
        # We don't have read access to the actual vault from this
        # workflow; this just exercises the input handling and
        # error path. Real integration tests run against a fixture
        # vault repo elsewhere.
