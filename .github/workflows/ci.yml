name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-node20-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node20-pnpm-
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Verify dist/ is up to date
        run: |
          pnpm run build
          if ! git diff --quiet dist/; then
            echo "::error::dist/ is out of sync with src/. Run 'pnpm run build' and commit."
            git diff dist/ | head -30
            exit 1
          fi

  selftest:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run the action against itself (mock vault)
        uses: ./
        continue-on-error: true
        with:
          vault-repo: chirag127/envpact-secrets
          vault-token: ${{ secrets.GITHUB_TOKEN }}
          project-name: envpact-action
          output-file: .env.test
        # We don't have read access to the actual vault from this
        # workflow; this just exercises the input handling and
        # error path. Real integration tests run against a fixture
        # vault repo elsewhere.
